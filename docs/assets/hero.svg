<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Obsidian Inbox hero illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.55" stop-color="#17212b"/>
      <stop offset="1" stop-color="#22313f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#65d6ad"/>
      <stop offset="1" stop-color="#f6c85f"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="115" y="110" width="1370" height="680" rx="36" fill="#f7f3ea" filter="url(#softShadow)"/>
  <rect x="115" y="110" width="1370" height="86" rx="36" fill="#263442"/>
  <circle cx="165" cy="153" r="13" fill="#f56565"/>
  <circle cx="207" cy="153" r="13" fill="#f6c85f"/>
  <circle cx="249" cy="153" r="13" fill="#65d6ad"/>
  <text x="315" y="163" fill="#e9f0f2" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Obsidian Inbox</text>
  <g transform="translate(180 250)">
    <text x="0" y="0" fill="#1b2733" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800">From scattered media</text>
    <text x="0" y="70" fill="#1b2733" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800">to durable Obsidian notes</text>
    <text x="0" y="135" fill="#52616f" font-family="Inter, Arial, sans-serif" font-size="26">A local-first Codex skill for videos, articles, transcripts,</text>
    <text x="0" y="172" fill="#52616f" font-family="Inter, Arial, sans-serif" font-size="26">deep summaries, folder notes, and clickable knowledge indexes.</text>
    <rect x="0" y="230" width="220" height="56" rx="12" fill="url(#accent)"/>
    <text x="31" y="266" fill="#14212b" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Local-first</text>
    <rect x="245" y="230" width="250" height="56" rx="12" fill="#e8eef0"/>
    <text x="278" y="266" fill="#263442" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Traceable notes</text>
  </g>
  <g transform="translate(925 245)">
    <rect x="0" y="0" width="430" height="420" rx="24" fill="#ffffff" stroke="#d7dee2" stroke-width="2"/>
    <rect x="34" y="35" width="238" height="25" rx="8" fill="#263442"/>
    <rect x="34" y="84" width="352" height="14" rx="7" fill="#c8d2d8"/>
    <rect x="34" y="115" width="315" height="14" rx="7" fill="#d9e0e4"/>
    <rect x="34" y="166" width="120" height="34" rx="9" fill="#65d6ad"/>
    <rect x="170" y="166" width="118" height="34" rx="9" fill="#f6c85f"/>
    <rect x="34" y="235" width="352" height="16" rx="8" fill="#263442"/>
    <rect x="34" y="276" width="352" height="13" rx="7" fill="#d9e0e4"/>
    <rect x="34" y="304" width="300" height="13" rx="7" fill="#d9e0e4"/>
    <rect x="34" y="332" width="338" height="13" rx="7" fill="#d9e0e4"/>
  </g>
</svg>
