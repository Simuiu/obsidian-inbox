  <style>

      color: #0b4f49;

      margin: 0;

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

      min-height: 38px;
      border: 1px solid #0f766e;
      background: var(--accent);
      color: white;
      border-radius: 7px;
      padding: 9px 13px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
    }

    button.copy.secondary {
      background: var(--paper);
      color: var(--accent);
    }

    button.copy:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(15, 118, 110, .16);

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));

      align-items: start;

      justify-content: space-between;

      padding: 12px 14px;
      border-bottom: 1px solid var(--line);

    .field h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;

    .content {

      font-size: 15px;
      color: #2e2a25;

      overflow: auto;

    }

    .content.rich h2 {
      font-size: 22px;
      margin: 22px 0 8px;
      font-family: Georgia, "Times New Roman", serif;
    }

    .content.rich p {

      line-height: 1.85;

    .content.rich blockquote {
      margin: 16px 0;
      padding: 12px 16px;
      border-left: 4px solid var(--accent);
      background: #e9f6f2;
      color: #0b4f49;
    }

    .content.rich ul {
      margin: 8px 0 16px 22px;
      padding: 0;
    }

    .content.rich li {
      margin: 6px 0;

    .assets {

      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: #f7efe2;

    .assets img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid rgba(37,34,30,.12);

    .asset-path {

      color: var(--muted);

    code, pre {

    pre {

      border-radius: 7px;

    .toast.show {

    .deerflow-badge {

      <h2>AI 总结之后，知识应该去哪？</h2>
      <p>很多人现在已经习惯用 AI 总结文章、视频和课程。</p>

      <p>它不是为了再生成一段更漂亮的摘要，而是想解决“摘要之后”的问题：</p>
      <ul>
        <li>这条资料应该放在哪里？</li>
        <li>半年后还能不能找回来？</li>
        <li>原文、字幕、转写能不能追溯？</li>
        <li>快速收藏和深度学习能不能分开？</li>
        <li>如果平台抓不到正文或字幕，工具会不会编造一篇看似完整的笔记？</li>
      </ul>
      <p><strong>Obsidian Inbox 的定位很简单：</strong></p>
      <blockquote>把 Codex 变成你的本地知识入库员：链接进来，Obsidian 笔记、原始材料和可点击索引自动生成。</blockquote>
      <p>它的基本流程是：</p>
      <pre>链接或本地文件
-> 本地脚本采集正文/字幕/转写
-> 生成任务包
-> Codex 读取 compact.md
-> 写入结构化 Obsidian 笔记
-> 原始材料进入 _resources
-> 重建资料库索引、主题索引、用途索引</pre>
      <p>我刻意把它做成 local-first。</p>
      <p>也就是说，Vault、字幕、正文、转写、本地视频路径、原始材料，默认都在你自己的机器上处理。它不会默认把你的 Obsidian Vault 上传到云端，也不会尝试绕过登录、验证码、付费墙或私有内容限制。</p>
      <p>如果抓不到正文、字幕或可靠转写，它不会硬编一篇总结，而是保留失败状态，等你补充材料。</p>
      <h2>目前支持哪些场景？</h2>
      <ul>
        <li>B 站视频：读取元数据和字幕，生成普通或深度 Obsidian 笔记。</li>
        <li>微信公众号公开文章：抓取公开正文，转成 Markdown，并保留原始材料。</li>
        <li>本地视频/音频：导入本地文件，结合转写或 ASR 结果生成笔记。</li>
        <li>普通网页和 YouTube：保守支持，取决于正文和字幕是否可访问。</li>

      <p>我最在意的不是“能不能一次性总结”，而是这条资料能不能稳定变成知识库里的一个资产。</p>
      <p>所以每条资料会有一个主笔记，也会有 <code>_resources</code> 目录保存相关材料。索引层面会维护三个入口：资料库索引、主题索引、用途索引。</p>
      <p>笔记也分成两种模式：普通总结适合快速入库和第一遍理解；深度总结适合课程、教学、系统学习、本地视频和需要长期复用的内容。</p>
      <p>举个例子，如果你把一个本地课程视频交给它，理想结果不是一段“本视频主要讲了什么”，而是一篇带问题链、概念地图、机制拆解、实践路径和来源追溯的 Obsidian 深度笔记。</p>
      <h2>适合谁？</h2>
      <ul>
        <li>已经使用 Obsidian，但收藏和资料整理压力很大的人。</li>
        <li>经常用 AI 总结内容，但结果散落在聊天窗口里的人。</li>
        <li>看课程、会议、长视频，需要沉淀复盘材料的人。</li>
        <li>想把 Codex 从一次性问答变成可重复工作流的人。</li>
        <li>关心本地优先、Markdown、可追溯材料的知识管理用户。</li>
      </ul>
      <p>它现在还处在早期阶段，不是一个“全平台一键导入”的万能工具。</p>
      <blockquote>能自动化的自动化；涉及平台权限、账号安全、内容判断和发布审核的部分，保留人工确认。</blockquote>
      <p>如果你也有类似需求，可以先看 GitHub 项目：</p>
      <p><a href="https://github.com/Simuiu/obsidian-inbox">https://github.com/Simuiu/obsidian-inbox</a></p>
      <p>如果这个方向对你有用，欢迎 Star。也欢迎在 Issue 里告诉我：你最想入库哪类资料、你希望 Obsidian 笔记长什么样、你现在整理视频文章课程时最卡在哪一步。</p>
      <p>对我来说，这个项目真正想解决的问题不是“AI 能不能总结”，而是：</p>
      <blockquote>AI 总结之后，知识应该去哪？</blockquote>
      <p>我的答案是：回到你自己的知识库里，带着来源，带着索引，带着以后还能复用的结构。</p>
    `;

    const data = [
      {
        id: "wechat",
        name: "微信公众号",
        note: "复制标题、摘要、富文本正文。正文按钮会优先写入 text/html，适合粘到公众号编辑器。",
        images: ["images/wechat/cards/wechat-01.png","images/wechat/cards/wechat-02.png","images/wechat/cards/wechat-03.png","images/wechat/cards/wechat-04.png","images/wechat/cards/wechat-05.png"],
        fields: [
          { label: "标题", key: "title", text: "AI 总结之后，知识应该去哪？我做了一个 Obsidian 本地入库工具" },
          { label: "摘要", key: "summary", text: "Obsidian Inbox 不是又一个 AI 总结工具，而是一套 local-first 的 Codex + Obsidian 入库工作流：把视频、文章、本地资料整理成可追溯、可索引、可复用的知识库。" },
          { label: "正文", key: "body", html: wechatHtml, text: stripHtml(wechatHtml), full: true, rich: true }

      {
        id: "zhihu",
        name: "知乎",
        note: "适合回答“如何用 AI 做知识管理 / AI 总结工具是否有用”等问题，语气保持方法论分享。",
        images: ["images/zhihu/cards/zhihu-01.png","images/zhihu/cards/zhihu-02.png","images/zhihu/cards/zhihu-03.png","images/zhihu/cards/zhihu-04.png","images/zhihu/cards/zhihu-05.png"],
        fields: [
          { label: "标题", key: "title", text: "AI 总结工具最大的问题，是总结完之后知识没有地方去" },
          { label: "摘要", key: "summary", text: "这篇回答重点讲“AI 总结之后的入库工作流”，弱化硬广，最后自然引导 GitHub。" },
          { label: "正文", key: "body", full: true, text: `我现在越来越觉得，AI 总结本身不是知识管理里最难的一步。

真正难的是：总结之后，这些内容能不能回到一个长期可维护、可检索、可复用的系统里。

很多人的流程是这样的：

1. 看到一篇文章或一个视频。
2. 扔给 AI 总结。
3. 得到一段看起来不错的摘要。
4. 摘要留在聊天记录里。
5. 几天后忘了它在哪里。

这就会导致一个问题：AI 提高了“当下理解”的效率，但没有解决“长期沉淀”的问题。

所以我会更建议把 AI 总结看成知识管理链路中的一个环节，而不是终点。

一个更完整的流程应该是：

资料进入 -> 提取正文/字幕/转写 -> AI 生成结构化笔记 -> 保留原始材料 -> 写入知识库 -> 建立索引 -> 后续可以复盘、引用、二次加工。

我自己为这个思路做了一个开源小工具：Obsidian Inbox。

它的目标不是再做一个“总结得更好”的工具，而是把 Codex 接进 Obsidian，让视频、文章和本地资料可以变成结构化 Markdown 笔记。

它有几个设计原则：

- local-first：Vault、转写、正文和原始材料默认留在本地。
- Obsidian-native：输出 Markdown、frontmatter、Wiki links 和索引。
- 可追溯：原始材料进入 _resources，笔记不只是孤立摘要。
- 失败安全：抓不到正文、字幕或可靠转写时，不编造总结。
- 分层总结：普通总结用于快速入库，深度总结用于课程和系统学习。

我觉得这类工具真正适合的人，不是偶尔让 AI 总结一篇文章的人，而是长期使用 Obsidian 做资料库、收藏大量视频文章课程、希望 AI 输出能沉淀进自己知识系统的人。

当然，它不是万能的，也不会绕过平台限制。涉及登录、验证码、付费墙、私有内容的场景，仍然应该遵守平台规则，优先使用自己可访问或本地导出的材料。

如果你也在用 Obsidian，并且遇到“收藏很多但沉淀很少”的问题，可以看看这个项目：

https://github.com/Simuiu/obsidian-inbox

我更推荐把它理解成一个思路：不要只追求让 AI 总结得更快，而是让 AI 生成的东西有地方沉淀。` }

        fields: [
          { label: "标题", key: "title", text: "如何设计一个 local-first 的 Codex + Obsidian 内容入库工作流" },

          { label: "正文 Markdown", key: "body", full: true, text: `这篇文章介绍一个我最近在做的开源项目：Obsidian Inbox。

项目地址：https://github.com/Simuiu/obsidian-inbox

它解决的问题不是“如何让 AI 总结一篇文章”，而是另一个更工程化的问题：

> 如何把外部内容稳定地变成 Obsidian 里可追溯、可索引、可复用的 Markdown 笔记？

## 设计目标

很多 AI 总结工具的结果停留在对话里。对个人知识管理来说，这个结果很脆弱：缺少固定存放位置、来源追溯、统一 frontmatter、索引、失败状态，也很难批量复盘。

所以 Obsidian Inbox 采用了一个更偏工作流的设计：

\`\`\`text
source -> capture script -> task package -> compact.md -> Codex Skill -> Obsidian note -> _resources archive -> rebuilt indexes
\`\`\`

## 核心结构

任务包通常包含 meta.json、compact.md、prompt.md，以及原始正文、字幕或转写材料。Codex 默认只读取 meta.json、compact.md、prompt.md，避免把完整字幕或正文塞进上下文。

写入 Obsidian 后，每条资源会形成类似结构：

\`\`\`text
00_资料库/YYMMDD 短标题/YYMMDD 短标题.md
00_资料库/YYMMDD 短标题/_resources
\`\`\`

索引则维护资料库索引、主题索引和用途索引。

## 为什么要保留 _resources

AI 生成内容最大的问题之一是“看起来对，但无法回到来源”。所以这个项目会把原始材料归档到 _resources，主笔记只保留总结、重点、时间点、行动清单和资源链接。

## 普通总结和深度总结

普通总结适合快速入库，深度总结适合课程、教学和系统学习。两个模式会写入 frontmatter，例如 summary_mode: "深度"。

## 失败安全

如果正文、字幕或转写抓取失败，任务会保留失败状态。比如微信视频号、本地视频等场景，如果没有转写或 ASR 结果，就不会生成假总结。

    function stripHtml(html) {
      const temp = document.createElement("div");
      temp.innerHTML = html;
      return temp.innerText.trim();
    }

    const tabs = document.getElementById("tabs");
    const fields = document.getElementById("fields");
    const title = document.getElementById("platformTitle");
    const note = document.getElementById("platformNote");
    const quick = document.getElementById("quickActions");
    const toast = document.getElementById("toast");
    let active = data[0].id;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1300);
    }

    function legacyCopyText(text) {
      const area = document.createElement("textarea");
      area.value = text;
      area.setAttribute("readonly", "");
      area.style.position = "fixed";
      area.style.left = "-9999px";
      document.body.appendChild(area);
      area.select();
      document.execCommand("copy");
      document.body.removeChild(area);
    }

    async function copyText(text, label) {
      try {
        if (!navigator.clipboard) throw new Error("Clipboard API unavailable");
        await navigator.clipboard.writeText(text);
      } catch (error) {
        legacyCopyText(text);
      }
      showToast(`已复制：${label}`);
    }

    async function copyRich(html, text, label) {
      try {
        if (!navigator.clipboard || !window.ClipboardItem) throw new Error("Rich clipboard unavailable");
        const item = new ClipboardItem({
          "text/html": new Blob([html], { type: "text/html" }),
          "text/plain": new Blob([text], { type: "text/plain" })
        });
        await navigator.clipboard.write([item]);
      } catch (error) {
        legacyCopyText(text);
      }
      showToast(`已复制：${label}`);
    }

    function renderTabs() {
      tabs.innerHTML = "";
      data.forEach(item => {
        const btn = document.createElement("button");
        btn.className = `tab${item.id === active ? " active" : ""}`;
        btn.textContent = item.name;
        btn.onclick = () => {
          active = item.id;
          render();
        };
        tabs.appendChild(btn);
      });
    }

    function render() {
      renderTabs();
      const item = data.find(x => x.id === active);
      title.textContent = item.name;
      note.textContent = item.note;
      quick.innerHTML = "";
      fields.innerHTML = "";

      const copyAll = document.createElement("button");
      copyAll.className = "copy";
      copyAll.textContent = "复制本平台全部文案";
      copyAll.onclick = () => copyText(item.fields.map(field => `【${field.label}】\n${field.text}`).join("\n\n"), `${item.name}全部文案`);
      quick.appendChild(copyAll);

      if (item.images && item.images.length) {
        const assets = document.createElement("article");
        assets.className = "field full";
        const head = document.createElement("div");
        head.className = "field-head";
        const h2 = document.createElement("h2");
        h2.textContent = `配图素材（${item.images.length} 张）`;
        const copyPaths = document.createElement("button");
        copyPaths.className = "copy";
        copyPaths.textContent = "复制图片路径";
        copyPaths.onclick = () => copyText(item.images.join("\n"), `${item.name}图片路径`);
        head.appendChild(h2);
        head.appendChild(copyPaths);
        const grid = document.createElement("div");
        grid.className = "assets";
        item.images.forEach(src => {
          const img = document.createElement("img");
          img.src = src;
          img.alt = src;
          grid.appendChild(img);
        });
        const path = document.createElement("div");
        path.className = "asset-path";
        path.textContent = item.images.join(" · ");
        assets.appendChild(head);
        assets.appendChild(grid);
        assets.appendChild(path);
        fields.appendChild(assets);
      }

      item.fields.forEach(field => {
        const q = document.createElement("button");
        q.className = "copy secondary";
        q.textContent = `复制${field.label}`;
        q.onclick = () => field.html ? copyRich(field.html, field.text, field.label) : copyText(field.text, field.label);
        quick.appendChild(q);

        const card = document.createElement("article");
        card.className = `field${field.full ? " full" : ""}`;
        const head = document.createElement("div");
        head.className = "field-head";
        const h2 = document.createElement("h2");
        h2.textContent = field.label;
        const copy = document.createElement("button");
        copy.className = "copy";
        copy.textContent = "复制";
        copy.onclick = () => field.html ? copyRich(field.html, field.text, field.label) : copyText(field.text, field.label);
        head.appendChild(h2);
        head.appendChild(copy);

        const body = document.createElement("div");
        body.className = `content${field.rich ? " rich" : ""}`;
        if (field.html) body.innerHTML = field.html;
        else body.textContent = field.text;

        card.appendChild(head);
        card.appendChild(body);
        fields.appendChild(card);
      });
    }

    render();
  </script>
