## 背景

我平时会看很多长视频、课程、技术文章和公众号文章。用 AI 总结确实省时间，但总结结果经常留在聊天窗口里，没有原始材料，没有统一 frontmatter，也没有索引。资料越多，越像一堆碎片。

## 现在的流程

链接或本地文件 -> 本地脚本准备正文/字幕/转写 -> 生成任务包 -> Codex 读取 compact.md -> 写入 Obsidian Markdown -> 原始材料进入 _resources -> 重建索引

这里面我刻意做了一个限制：Codex 默认只读 meta.json、compact.md、prompt.md，不直接把完整字幕塞进上下文。

## 输出结构

每条资料最后会变成类似这样：

00_资料库/YYMMDD 短标题/YYMMDD 短标题.md
00_资料库/YYMMDD 短标题/_resources

主笔记放总结、重点、时间点、行动清单和资源链接；原始材料留在 _resources。

## 边界

这个项目不追求全平台一键导入。
能拿到公开正文或字幕，就继续整理；拿不到可靠材料，就保留失败状态。不绕过登录、验证码、付费墙，也不把不确定内容写成确定结论。

适合 Obsidian 用户、课程和长视频资料整理、想把 Codex 用在固定本地流程里的人。

    function asset(title, path, use, portrait = false) { return { title, path, use, portrait }; }
    function cards(platform, count, uses) {
      return Array.from({ length: count }, (_, i) => asset(`图 ${i + 1}`, `images/${platform}/cards/${platform}-${String(i + 1).padStart(2, "0")}.png`, uses[i] || `配图 ${i + 1}`));
    }
    function xhsAssets() {
      return Array.from({ length: 6 }, (_, i) => asset(`上传顺序 ${i + 1}`, `images/xiaohongshu/final-cards/xiaohongshu-final-${String(i + 1).padStart(2, "0")}.png`, ["首图痛点", "旧流程问题", "新流程", "Obsidian 输出", "适用人群", "边界和 GitHub"][i], true));
    }
    function biliAssets() {
      return [
        ...Array.from({ length: 5 }, (_, i) => asset(i === 0 ? "推荐封面" : `备选封面 ${i + 1}`, `images/bilibili/final-covers/bilibili-cover-${String(i + 1).padStart(2, "0")}.png`, i === 0 ? "投稿封面优先用这张" : "备选封面")),
        ...cards("bilibili", 5, ["视频卡 1", "视频卡 2", "视频卡 3", "视频卡 4", "视频卡 5"])
      ];
    }

    const tabs = document.getElementById("tabs");
    const app = document.getElementById("app");
    const toast = document.getElementById("toast");

    function normalize(text) { return String(text).split("\\n").map(s => s.trim()).filter(Boolean).join("\\n"); }
    function escapeHtml(value) { return String(value).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[c])); }
    function escapeAttr(value) { return escapeHtml(value).replace(/\\n/g, "&#10;"); }
    function showToast(message) { toast.textContent = message; toast.classList.add("show"); clearTimeout(showToast.timer); showToast.timer = setTimeout(() => toast.classList.remove("show"), 2200); }

    async function copyPlain(text, label) {
      const value = normalize(text);
      try { await navigator.clipboard.writeText(value); }
      catch {
        const area = document.createElement("textarea");
        area.value = value; document.body.appendChild(area); area.select(); document.execCommand("copy"); area.remove();
      }
      showToast(`${label}已复制`);
    }

    async function downloadFile(path) {
      try {
        const response = await fetch(path);
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url; link.download = path.split("/").pop() || "asset";
        document.body.appendChild(link); link.click(); link.remove(); URL.revokeObjectURL(url);
        showToast("已开始下载");
      } catch {
        window.open(path, "_blank");
        showToast("下载失败，已打开文件");
      }
    }

    function platformText(p) {
      const fields = Object.entries(p.fields).map(([k, v]) => `【${k}】\\n${v}`).join("\\n\\n");
      return `${fields}\\n\\n【正文】\\n${p.body}`;
    }

    function renderTabs(activeId) {
      tabs.innerHTML = platforms.map(p => `<button class="tab ${p.id === activeId ? "active" : ""}" data-id="${p.id}">${p.name}</button>`).join("");
      tabs.querySelectorAll(".tab").forEach(btn => btn.addEventListener("click", () => render(btn.dataset.id)));
    }

    function render(id = "wechat") {
      const p = platforms.find(item => item.id === id) || platforms[0];
      renderTabs(p.id);
      const fields = Object.entries(p.fields).map(([label, value]) => `
        <div class="field ${String(value).length > 120 ? "full" : ""}">
          <div class="field-label"><span>${label}</span><button class="ghost" data-copy="${escapeAttr(value)}" data-label="${label}">复制</button></div>
          <div class="field-content">${escapeHtml(value)}</div>
        </div>
      `).join("");
      app.innerHTML = `
        <div class="top">
          <div><h2 class="title">${p.name}</h2><p class="hint">${p.note}</p></div>
          <div class="actions"><button data-copy="${escapeAttr(platformText(p))}" data-label="${p.name}全部内容">复制本平台全部</button><button class="secondary" data-copy="${GH}" data-label="GitHub 链接">复制 GitHub</button></div>
        </div>
        <section class="panel"><div class="panel-head"><h2>发布字段</h2></div><div class="body fields">${fields}</div></section>
        <section class="panel"><div class="panel-head"><h2>正文</h2><button class="secondary" data-copy="${escapeAttr(p.body)}" data-label="正文">复制正文</button></div><div class="body"><div class="text">${escapeHtml(p.body)}</div></div></section>
        <section class="panel"><div class="panel-head"><h2>素材</h2><button class="secondary" data-copy="${escapeAttr(p.assets.map(a => a.path).join("\\n"))}" data-label="素材路径">复制全部路径</button></div><div class="body assets">${p.assets.map(a => `
          <article class="asset ${a.portrait ? "portrait" : ""}">
            <img src="${a.path}" alt="${a.title}">
            <div class="asset-body">
              <p class="asset-title">${a.title}</p>
              <p class="asset-use">${a.use}</p>
              <div class="asset-actions">
                <button data-download="${a.path}">下载</button>
                <a class="btn secondary" href="${a.path}" target="_blank" rel="noreferrer">打开</a>
                <button class="ghost" data-copy="${a.path}" data-label="素材路径">复制路径</button>
              </div>
            </div>
          </article>`).join("")}</div></section>
        <section class="panel"><div class="panel-head"><h2>发布前检查</h2></div><div class="body"><ul class="checklist"><li>每个平台只发当前这一版，不再三选一。</li><li>图片/视频优先下载后上传，不依赖粘贴。</li><li>不要承诺全平台一键、绕过登录、绕过验证码或付费墙。</li><li>发布后记录链接、时间、阅读/播放、点赞、收藏、评论。</li></ul></div></section>
      `;
      app.querySelectorAll("[data-copy]").forEach(el => el.addEventListener("click", () => copyPlain(el.dataset.copy, el.dataset.label || "内容")));
      app.querySelectorAll("[data-download]").forEach(el => el.addEventListener("click", () => downloadFile(el.dataset.download)));
    }

    render();
  </script>
</body>
</html>
