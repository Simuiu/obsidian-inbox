<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Obsidian Inbox 全平台发布工作台</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --paper: #fffdf8;
      --ink: #26231f;
      --muted: #716b61;
      --line: #d8d0c4;
      --soft: #ebe4d8;
      --accent: #0f766e;
      --accent-dark: #0b4f49;
      --warn: #a34716;
      --code: #18222f;
      --green-soft: #e3f4ef;
      --shadow: 0 18px 45px rgba(65, 54, 39, .10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(38,35,31,.045) 1px, transparent 1px),
        linear-gradient(rgba(38,35,31,.035) 1px, transparent 1px),
        var(--bg);
      background-size: 26px 26px;
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", sans-serif;
    }

    .layout {
      display: grid;
      grid-template-columns: 292px minmax(0, 1fr);
      min-height: 100vh;
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 24px 18px;
      border-right: 1px solid var(--line);
      background: rgba(255,253,248,.9);
      backdrop-filter: blur(14px);
    }

    .brand {
      padding: 0 4px 18px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 16px;
    }

    .eyebrow {
      color: var(--warn);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
    }

    h1, h2, h3 { letter-spacing: 0; }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 31px;
      line-height: 1.05;
      margin: 8px 0 10px;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    nav {
      display: grid;
      gap: 8px;
    }

    .tab {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 8px;
      min-height: 44px;
      padding: 10px 12px;
      background: transparent;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      font-size: 14px;
    }

    .tab:hover { background: rgba(15,118,110,.08); }
    .tab.active {
      background: var(--green-soft);
      border-color: rgba(15,118,110,.36);
      color: var(--accent-dark);
      font-weight: 800;
    }

    main {
      width: 100%;
      max-width: 1240px;
      padding: 34px clamp(18px, 4vw, 54px) 74px;
    }

    .top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
      margin-bottom: 18px;
    }

    .title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(32px, 4vw, 52px);
      line-height: 1;
    }

    .strategy {
      margin: 10px 0 0;
      max-width: 820px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 9px;
    }

    button, .link-btn {
      min-height: 36px;
      border: 1px solid var(--accent);
      border-radius: 7px;
      background: var(--accent);
      color: #fff;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }

    button.secondary, .link-btn.secondary {
      background: var(--paper);
      color: var(--accent);
    }

    button.ghost {
      border-color: var(--line);
      background: #f8f3ea;
      color: var(--ink);
    }

    button:hover, .link-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 9px 18px rgba(15,118,110,.16);
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,253,248,.96);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 16px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      background: #ede5d7;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 15px;
    }

    .body {
      padding: 16px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffaf1;
      overflow: hidden;
    }

    .field.full { grid-column: 1 / -1; }

    .field-label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #f4eddf;
      font-size: 13px;
      font-weight: 800;
    }

    .field-content {
      padding: 12px;
      white-space: pre-wrap;
      line-height: 1.75;
      font-size: 14px;
    }

    .blocks {
      display: grid;
      gap: 12px;
    }

    .block {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffaf1;
      overflow: hidden;
    }

    .block-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      background: #f4eddf;
      border-bottom: 1px solid var(--line);
    }

    .block h3 {
      margin: 0;
      font-size: 15px;
    }

    .insert-note {
      margin: 0 0 10px;
      color: var(--warn);
      font-weight: 800;
      font-size: 13px;
    }

    .text {
      white-space: pre-wrap;
      line-height: 1.78;
      font-size: 15px;
    }

    .text code, pre {
      font-family: Menlo, Consolas, monospace;
      background: #eef1ef;
      color: var(--code);
      border-radius: 5px;
      padding: 2px 4px;
    }

    pre {
      padding: 10px;
      overflow: auto;
      white-space: pre;
    }

    .asset-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .asset {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffaf1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .asset img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    .asset.portrait img { aspect-ratio: 3 / 4; }

    .asset-body {
      padding: 10px;
      display: grid;
      gap: 8px;
      flex: 1;
    }

    .asset-title {
      margin: 0;
      font-size: 13px;
      font-weight: 900;
    }

    .asset-use {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .asset-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: auto;
    }

    .asset-actions button, .asset-actions .link-btn {
      width: 100%;
      min-height: 32px;
      padding: 6px 8px;
      font-size: 12px;
    }

    .checklist {
      margin: 0;
      padding-left: 18px;
      line-height: 1.8;
      color: var(--muted);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 10;
      border-radius: 999px;
      background: #17231f;
      color: #fff;
      padding: 10px 15px;
      font-size: 13px;
      box-shadow: 0 16px 40px rgba(0,0,0,.18);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -4px);
    }

    .deerflow {
      position: fixed;
      right: 14px;
      bottom: 12px;
      z-index: 5;
      color: rgba(38,35,31,.54);
      border: 1px solid rgba(38,35,31,.14);
      background: rgba(255,253,248,.72);
      backdrop-filter: blur(8px);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      text-decoration: none;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      aside {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .top { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
      .asset-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .field-grid { grid-template-columns: 1fr; }
      .field.full { grid-column: auto; }
    }

    @media (max-width: 560px) {
      nav { grid-template-columns: 1fr; }
      .asset-grid { grid-template-columns: 1fr; }
      main { padding: 24px 14px 70px; }
      .title { font-size: 32px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <div class="brand">
        <div class="eyebrow">Publish Desk</div>
        <h1>全平台发布工作台</h1>
        <p>按平台复制标题、摘要、正文块和配图。图片复制受浏览器限制，失败时用“打开图片”上传。</p>
      </div>
      <nav id="tabs"></nav>
    </aside>
    <main id="app"></main>
  </div>
  <div class="toast" id="toast"></div>
  <a class="deerflow" href="https://deerflow.tech" target="_blank" rel="noreferrer">Created By Deerflow</a>

        fields: {

          "摘要": "我做了一个 local-first 的 Obsidian 入库工作流：链接或本地文件进来，正文/字幕/转写被整理成 Markdown 笔记，原始材料归档，索引自动重建。",

        },
        blocks: [
          {
            title: "开头：我真正卡住的不是总结",
            image: "插图 1 放在本段后",
            text: "过去一年，我越来越频繁地用 AI 总结文章、视频、课程和会议材料。\n\n一开始很爽：几十分钟的视频，几秒钟就能得到重点；一篇长文章，马上能变成要点列表。\n\n但用久之后，我发现真正麻烦的不是“AI 会不会总结”，而是：\n\n总结完之后，它到底去哪了？\n\n很多摘要最后停在聊天窗口里。过几天想找，要么翻聊天记录，要么重新找链接，要么重新让 AI 总结一遍。\n\n这不是知识管理，只是把临时理解变快了。"

          {
            title: "问题：收藏越来越多，知识却没有沉淀",

          },
          {

            text: "Obsidian Inbox 的定位很简单：\n\n把 Codex 变成你的本地知识入库员。\n\n它做的不是生成一段更漂亮的摘要，而是把外部内容变成 Obsidian 里可追溯、可索引、可复用的 Markdown 笔记。\n\n目前的主流程是：\n\n链接 -> 本地脚本抓字幕/正文 -> 生成 compact.md -> Codex 生成 Obsidian 笔记 -> 重建索引\n\n每条资料会有一个主笔记，也会有 _resources 目录保存原始正文、字幕、转写或本地文件路径。\n\n这样做的好处是：你以后看到的不只是一段摘要，而是一条带来源、带上下文、带索引入口的知识资产。"
          },
          {
            title: "我刻意做了几个限制",
            image: "插图 4 放在原则列表后",
            text: "我没有把它包装成“全平台一键导入”。\n\n原因很简单：很多平台有登录、权限、验证码、版权和付费内容边界。一个个人知识管理工具，不应该宣传自己能绕过这些限制。\n\n所以它的原则是：\n\n- 能正常抓到公开正文或字幕，才总结。\n- 抓不到正文、字幕或可靠转写时，不编造内容。\n- Vault、Markdown、原始材料默认留在本机。\n- 涉及账号权限和高风险自动化时，保留人工确认。\n\n这也是我最看重的地方：失败要透明，来源要可追溯。"

          }
        ],

        fields: {
          "标题候选": "AI 总结工具最大的问题：总结完之后没人管\n用 AI 做知识管理，关键不是总结\n为什么我把 Codex 接进了 Obsidian？",

    function cards(platform, count, uses) {
      return Array.from({ length: count }, (_, i) => ({
        title: `图 ${i + 1}`,
        path: `images/${platform}/cards/${platform}-${String(i + 1).padStart(2, "0")}.png`,
        use: uses[i] || `配图 ${i + 1}`,
        portrait: false
      }));
    }

    function finalXhs() {
      const uses = ["首图：痛点", "旧流程问题", "新工作流", "Obsidian 输出", "适用人群", "边界和 GitHub"];
      return uses.map((use, i) => ({
        title: `上传顺序 ${i + 1}`,
        path: `images/xiaohongshu/final-cards/xiaohongshu-final-${String(i + 1).padStart(2, "0")}.png`,
        use,
        portrait: true
      }));
    }

    function biliAssets() {
      return [
        ...Array.from({ length: 5 }, (_, i) => ({
          title: i === 0 ? "推荐封面" : `备选封面 ${i + 1}`,
          path: `images/bilibili/final-covers/bilibili-cover-${String(i + 1).padStart(2, "0")}.png`,
          use: i === 0 ? "投稿封面优先用这张" : "不满意首图时替换封面",
          portrait: false
        })),
        ...cards("bilibili", 5, ["视频卡 1", "视频卡 2", "视频卡 3", "视频卡 4", "视频卡 5"])
      ];
    }

    const tabs = document.getElementById("tabs");
    const app = document.getElementById("app");
    const toast = document.getElementById("toast");

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 2200);
    }

    async function copyText(text, label = "内容") {
      try {
        await navigator.clipboard.writeText(text);
        showToast(`${label}已复制`);
      } catch (err) {
        const area = document.createElement("textarea");
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
        showToast(`${label}已复制`);
      }
    }

    async function copyImage(path) {
      try {
        const response = await fetch(path);
        const blob = await response.blob();
        const type = blob.type || "image/png";
        await navigator.clipboard.write([new ClipboardItem({ [type]: blob })]);
        showToast("图片已复制，可直接粘贴试试");
      } catch (err) {
        window.open(path, "_blank");
        showToast("浏览器限制复制图片，已打开图片，请右键复制或上传");
      }
    }

    function platformText(p) {
      const fields = Object.entries(p.fields).map(([k, v]) => `【${k}】\n${v}`).join("\n\n");
      const blocks = p.blocks.map(b => `【${b.title}】\n${b.image}\n${b.text}`).join("\n\n");
      return [fields, blocks].filter(Boolean).join("\n\n");
    }

    function renderTabs(activeId) {
      tabs.innerHTML = platforms.map(p => `<button class="tab ${p.id === activeId ? "active" : ""}" data-id="${p.id}">${p.name}</button>`).join("");
      tabs.querySelectorAll(".tab").forEach(btn => btn.addEventListener("click", () => render(btn.dataset.id)));
    }

    function render(id = platforms[0].id) {
      const p = platforms.find(item => item.id === id) || platforms[0];
      renderTabs(p.id);

      const fieldsHtml = Object.entries(p.fields).map(([label, value]) => `
        <div class="field ${value.length > 160 ? "full" : ""}">
          <div class="field-label">
            <span>${label}</span>
            <button class="ghost" data-copy="${escapeAttr(value)}" data-label="${label}">复制</button>
          </div>
          <div class="field-content">${escapeHtml(value)}</div>
        </div>
      `).join("");

      const blocksHtml = p.blocks.length ? `
        <section class="panel">
          <div class="panel-head">
            <h2>正文分段</h2>
            <button class="secondary" data-copy="${escapeAttr(p.blocks.map(b => b.text).join("\n\n"))}" data-label="正文">复制纯正文</button>
          </div>
          <div class="body blocks">
            ${p.blocks.map(block => `
              <article class="block">
                <div class="block-head">
                  <h3>${block.title}</h3>
                  <button class="ghost" data-copy="${escapeAttr(block.text)}" data-label="${block.title}">复制本段</button>
                </div>
                <div class="body">
                  <p class="insert-note">${block.image}</p>
                  <div class="text">${formatText(block.text)}</div>
                </div>
              </article>
            `).join("")}
          </div>
        </section>
      ` : "";

      const assetsHtml = `
        <section class="panel">
          <div class="panel-head">
            <h2>配图/视频素材</h2>
            <button class="secondary" data-copy="${escapeAttr(p.assets.map(a => a.path).join("\n"))}" data-label="素材路径">复制全部路径</button>
          </div>
          <div class="body asset-grid">
            ${p.assets.map(asset => `
              <article class="asset ${asset.portrait ? "portrait" : ""}">
                <img src="${asset.path}" alt="${asset.title}">
                <div class="asset-body">
                  <p class="asset-title">${asset.title}</p>
                  <p class="asset-use">${asset.use}</p>
                  <div class="asset-actions">
                    <button class="ghost" data-img="${asset.path}">复制图片</button>
                    <a class="link-btn secondary" href="${asset.path}" target="_blank" rel="noreferrer">打开</a>
                    <button class="ghost" data-copy="${asset.path}" data-label="图片路径">复制路径</button>
                    <button class="ghost" data-copy="${escapeAttr(asset.use)}" data-label="图片用途">复制用途</button>
                  </div>
                </div>
              </article>
            `).join("")}
          </div>
        </section>
      `;

      app.innerHTML = `
        <div class="top">
          <div>
            <h2 class="title">${p.name}</h2>
            <p class="strategy">${p.strategy}</p>
          </div>
          <div class="actions">
            <button data-copy="${escapeAttr(platformText(p))}" data-label="${p.name}全部内容">复制本平台全部</button>
            <button class="secondary" data-copy="${GH}" data-label="GitHub 链接">复制 GitHub</button>
          </div>
        </div>

        <section class="panel">
          <div class="panel-head">
            <h2>发布字段</h2>
            <button class="secondary" data-copy="${escapeAttr(Object.values(p.fields).join("\n\n"))}" data-label="发布字段">复制全部字段</button>
          </div>
          <div class="body field-grid">${fieldsHtml}</div>
        </section>

        ${blocksHtml}
        ${assetsHtml}

        <section class="panel">
          <div class="panel-head"><h2>发布前检查</h2></div>
          <div class="body">
            <ul class="checklist">
              <li>标题选择 1 个，不要把 3 个候选都发出去。</li>
              <li>长文平台按图位插入图片；小红书按上传顺序发图；B 站/视频号先传视频再配封面。</li>
              <li>项目链接统一使用 ${GH}；小红书/视频号无法放链接时写 Simuiu/obsidian-inbox。</li>
              <li>不要承诺全平台一键、绕过登录、绕过验证码或付费墙。</li>
              <li>发布后把链接、时间、阅读/播放、点赞、收藏、评论记录到复盘表。</li>
            </ul>
          </div>
        </section>
      `;

      app.querySelectorAll("[data-copy]").forEach(el => {
        el.addEventListener("click", () => copyText(el.dataset.copy, el.dataset.label || "内容"));
      });
      app.querySelectorAll("[data-img]").forEach(el => {
        el.addEventListener("click", () => copyImage(el.dataset.img));
      });
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/\n/g, "&#10;");
    }

    function formatText(value) {
      const escaped = escapeHtml(value);
      return escaped.replace(/```([\s\S]*?)```/g, "<pre>$1</pre>").replace(/\n/g, "<br>");
    }

    render();
  </script>
